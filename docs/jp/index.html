<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sumpo / azukid products</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>

<header class="site-header">
  <div class="site-header-inner">
    <span class="site-logo">sumpo / azukid.com</span>
    <nav class="lang-nav">
      <a class="lang-nav-pill current" href="#">日本語</a>
      <a class="lang-nav-pill" href="../en/index.html">English</a>
    </nav>
  </div>
</header>

<main class="page">

  <div class="hero">
    <h1>sumpo products</h1>
    <p class="hero-sub">iOS アプリのドキュメント・サイト</p>
  </div>

  <!-- 作者 -->
  <section class="section">
    <p class="section-heading">作者</p>
    <div class="link-list">
      <a class="link-item" href="sumpo/index.html">
        <span class="link-item-label">sumpo — 作者自己紹介</span>
        <span class="link-item-arrow">›</span>
      </a>
    </div>
  </section>

  <!-- 公開アプリ -->
  <section class="section">
    <p class="section-heading">公開アプリ</p>
    <div class="app-grid">
      <div class="app-card">
        <img class="app-card-icon" src="../images/icon-packlin.png" alt="モチメモ Packlin">
        <span class="app-card-name">モチメモ</span>
        <span class="app-card-sub">持ち物チェックリスト</span>
        <div class="app-card-footer">
          <a class="app-card-btn app-card-btn-doc" href="sumpo/Packlin/packlin.html">取扱説明書</a>
          <a class="app-card-btn app-card-btn-store" href="https://apps.apple.com/jp/app/id495525984">App&nbsp;Store</a>
        </div>
      </div>
      <div class="app-card">
        <img class="app-card-icon" src="../images/icon-calclin.png" alt="カルメモ Calclin">
        <span class="app-card-name">カルメモ</span>
        <span class="app-card-sub">多機能電卓</span>
        <div class="app-card-footer">
          <a class="app-card-btn app-card-btn-doc" href="sumpo/Calclin/calclin.html">取扱説明書</a>
          <a class="app-card-btn app-card-btn-store" href="https://apps.apple.com/jp/app/id385216637">App&nbsp;Store</a>
        </div>
      </div>
      <div class="app-card">
        <img class="app-card-icon" src="../images/icon-condition.png" alt="体調メモ Condition">
        <span class="app-card-name">体調メモ</span>
        <span class="app-card-sub">体調記録アプリ</span>
        <div class="app-card-footer">
          <a class="app-card-btn app-card-btn-doc" href="sumpo/Condition/condition.html">取扱説明書</a>
          <a class="app-card-btn app-card-btn-store" href="https://apps.apple.com/jp/app/id472914799">App&nbsp;Store</a>
        </div>
      </div>
      <div class="app-card">
        <img class="app-card-icon" src="../images/icon-credit.png" alt="クレメモ PayNote">
        <span class="app-card-name">クレメモ</span>
        <span class="app-card-sub">支払い管理メモ</span>
        <div class="app-card-footer">
          <a class="app-card-btn app-card-btn-store" href="https://apps.apple.com/jp/app/id432458298">App&nbsp;Store</a>
        </div>
      </div>
    </div>
  </section>


  <!-- お問い合わせ -->
  <section class="section">
    <p class="section-heading">サポート</p>
    <div class="link-list">
      <a class="link-item" href="sumpo/contact.html">
        <span class="link-item-label">お問い合わせ</span>
        <span class="link-item-arrow">›</span>
      </a>
    </div>
  </section>

  <!-- 契約書類 -->
  <section class="section">
    <p class="section-heading">契約書類</p>
    <div class="link-list">
      <a class="link-item" href="https://info.engineer.co.jp/EULA.html">
        <span class="link-item-label">エンドユーザー使用許諾契約</span>
        <span class="link-item-arrow">›</span>
      </a>
      <a class="link-item" href="https://info.engineer.co.jp/PrivacyPolicy.html">
        <span class="link-item-label">プライバシーポリシー</span>
        <span class="link-item-arrow">›</span>
      </a>
    </div>
  </section>

  <!-- 技術書類 -->
  <section class="section">
    <p class="section-heading">技術書類</p>
    <div class="link-list">
      <div class="link-item">
        <span class="link-item-label" style="color: var(--text-3); font-style: italic; font-weight: 400;">準備中</span>
      </div>
    </div>
  </section>
